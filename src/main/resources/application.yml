spring:
  application:
    name: techback

  datasource:
    url: jdbc:h2:mem:iespflix
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  error:
    include-message: always

logging:
  level:
    root: INFO